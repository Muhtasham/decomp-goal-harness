[project]
name = "decomp-goal-harness"
adapter = "generic"
default_unit = "attempt.c"
goal = "Validate the bundled toy matching oracle used by the harness."

[commands]
build = "uv run --project . python3 examples/toy_match/score.py --candidate {unit} --build-only"
score = "uv run --project . python3 examples/toy_match/score.py --candidate {unit} --json"
diff = "uv run --project . python3 examples/toy_match/score.py --candidate {unit} --diff"
