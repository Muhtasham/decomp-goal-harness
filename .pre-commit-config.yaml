repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        always_run: true
        types_or: [python, pyi]
      - id: ty-check
        name: ty check
        entry: uv run ty check .
        language: system
        pass_filenames: false
        always_run: true
        types_or: [python, pyi]
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
